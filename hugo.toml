baseURL = "https://kabuqin.github.io/cappuccino.github.io/"
defaultContentLanguage = "zh-cn"
enableEmoji = true
enableRobotsTXT = true
languageCode = "zh-cn"
pygmentsStyle = "monokai"
theme = "gokarna"
title = "卡布奇诺的技术笔记"
enableGitInfo = true

[params]
  avatarURL = "/images/avatar.webp"
  avatarSize = "size-m"
  avatarAltText = "avatar"
  description = "关于 OSCP、内网渗透与生活的碎片"
  footer = "卡布奇诺"
  metaKeywords = ["渗透测试", "OSCP", "漏洞复现", "安全研究", "内网渗透"]
  showBackToTopButton = true

  socialIcons = [
    {name = "github", url = "https://github.com/kabuqin"},
  ]

[menu]
  [[menu.main]]
    name = "首页"
    pre = "<span data-feather='home'></span>"
    url = "/"
    weight = 1

  [[menu.main]]
    name = "文章"
    pre = "<span data-feather='book'></span>"
    url = "/posts/"
    weight = 2

  [[menu.main]]
    name = "标签"
    pre = "<span data-feather='tag'></span>"
    url = "/tags/"
    weight = 3

  [[menu.main]]
    identifier = "github"
    pre = "<span data-feather='github'></span>"
    url = "https://github.com/kabuqin"
    weight = 4

  [[menu.main]]
    identifier = "rss"
    pre = "<span data-feather='rss'></span>"
    url = "/index.xml"
    weight = 5

[markup]
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 4
    ordered = false

[minify]
  minifyOutput = true
